# Default unit analysis configuration.
# This file belongs in pybastion_unit/unit_config.toml.
#
# Normal usage:
#   python pybastion_unit/run_project_analysis.py /path/to/target/project
#
# Path resolution:
#   source_root resolves against the target project root.
#   analysis_output_root resolves against the target project root.
#   inspect_root, eis_root, inventory_root, and logs_root resolve against analysis_output_root.
#   readiness.output resolves against inspect_root.
#   script paths resolve against the pybastion_unit package root.
#   Absolute paths are used as-is.

[paths]
source_root = "src"
analysis_output_root = "dist/pybastion"
inspect_root = "inspect"
eis_root = "eis"
inventory_root = "inventory"
logs_root = "logs"

[scripts]
stage1 = "stages/stage1_inspect_units.py"
stage2 = "stages/stage2_enumerate_exec_items.py"
stage3 = "stages/stage3_enumerate_callables.py"
readiness = "helpers/analyze_readiness.py"

[behavior]
continue_on_error = true
clean_logs = true
clean_outputs = true

[readiness]
enabled = false
output = "readiness.yaml"
format = "yaml"
grouping = "smt"
include_info = true
# max_findings_per_type = 50
